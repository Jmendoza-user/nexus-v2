<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="256" height="256" role="img" aria-label="NEXUS animado">
  <defs>
    <linearGradient id="nx-ag" x1="14" y1="10" x2="50" y2="54" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9B7BFF"></stop>
      <stop offset="1" stop-color="#6B4CE6"></stop>
    </linearGradient>
    <filter id="nx-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.6" result="b"></feGaussianBlur>
      <feMerge><feMergeNode in="b"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
    
  </defs>

  <g class="nx-glowg" filter="url(#nx-glow)">
    <path class="nx-seg" stroke="url(#nx-ag)" d="M18 48 V16 L46 48 V16"></path>
  </g>

  <path class="nx-seg nx-s1" stroke="url(#nx-ag)" d="M18 48 L18 16"></path>
  <path class="nx-seg nx-s2" stroke="url(#nx-ag)" d="M18 16 L46 48"></path>
  <path class="nx-seg nx-s3" stroke="url(#nx-ag)" d="M46 48 L46 16"></path>

  <circle class="nx-node nx-n2" fill="url(#nx-ag)" cx="18" cy="16" r="4.6"></circle>
  <circle class="nx-node nx-n1" fill="url(#nx-ag)" cx="18" cy="48" r="4.6"></circle>
  <circle class="nx-node nx-n3" fill="url(#nx-ag)" cx="46" cy="48" r="4.6"></circle>
  <circle class="nx-node nx-n4" fill="url(#nx-ag)" cx="46" cy="16" r="4.6"></circle>

  <g class="nx-coreg">
    <circle class="nx-core" fill="url(#nx-ag)" cx="32" cy="32" r="5.6"></circle>
    <circle cx="32" cy="32" r="2.2" fill="#fff"></circle>
  </g>
</svg>