<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Triángulo de advertencia -->
  <path d="M100 44 L168 156 L32 156 Z"
        stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Línea vertical de exclamación -->
  <line x1="100" y1="80" x2="100" y2="122" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <!-- Punto de exclamación -->
  <circle cx="100" cy="136" r="3" stroke="currentColor" stroke-width="2"/>
  <!-- Nubes de error a los lados -->
  <!-- Nube izquierda (símbolo de desconexión) -->
  <path d="M32 90 Q32 78 44 78 Q46 68 56 70 Q60 62 70 66 Q76 58 84 62 Q88 56 94 60"
        stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.4"/>
  <!-- Rayos de error -->
  <line x1="26" y1="66" x2="34" y2="74" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="34" y1="66" x2="26" y2="74" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Nube derecha -->
  <line x1="164" y1="70" x2="172" y2="78" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="172" y1="70" x2="164" y2="78" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Puntos orbita -->
  <circle cx="40" cy="168" r="3" stroke="currentColor" stroke-width="1.5"/>
  <circle cx="162" cy="164" r="2.5" stroke="currentColor" stroke-width="1.5"/>
  <circle cx="152" cy="40" r="2" stroke="currentColor" stroke-width="1.5"/>
</svg>
