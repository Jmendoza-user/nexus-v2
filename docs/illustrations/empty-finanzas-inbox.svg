<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Billetera abierta -->
  <rect x="38" y="68" width="124" height="80" rx="10"
        stroke="currentColor" stroke-width="1.5"/>
  <!-- Solapa billetera -->
  <path d="M38 90 L162 90" stroke="currentColor" stroke-width="1.5"/>
  <!-- Compartimento monedas -->
  <rect x="118" y="102" width="36" height="28" rx="6"
        stroke="currentColor" stroke-width="1.5"/>
  <!-- Moneda dentro -->
  <circle cx="136" cy="116" r="8" stroke="currentColor" stroke-width="1.5"/>
  <line x1="136" y1="111" x2="136" y2="121" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
  <line x1="131" y1="116" x2="141" y2="116" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
  <!-- Líneas de tarjeta izquierda -->
  <rect x="48" y="102" width="56" height="10" rx="3"
        stroke="currentColor" stroke-width="1.5"/>
  <line x1="48" y1="120" x2="80" y2="120" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
  <!-- Flecha subiendo (sin movimientos pendientes) -->
  <path d="M94 44 L100 36 L106 44" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="100" y1="36" x2="100" y2="56" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Sparkles -->
  <line x1="40" y1="52" x2="40" y2="60" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="36" y1="56" x2="44" y2="56" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="162" cy="154" r="3" stroke="currentColor" stroke-width="1.5"/>
  <circle cx="36" cy="148" r="2" stroke="currentColor" stroke-width="1.5"/>
</svg>
